<!DOCTYPE html>
<html>
<head>
  <title>Trash</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-2xl mb-4">🗑 Trash</h1>

<input type="text" id="search" placeholder="Search deleted files..."
       class="w-full p-2 mb-4 rounded text-black" oninput="renderTrash()">

<!-- LOADING -->
<div id="loading" class="space-y-3 hidden">
  <div class="h-6 bg-gray-700 rounded animate-pulse"></div>
  <div class="h-6 bg-gray-700 rounded animate-pulse"></div>
  <div class="h-6 bg-gray-700 rounded animate-pulse"></div>
</div>

<!-- DATA -->
<div id="trashData"></div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw2Nb6UadQZpu1wSmYKwrJbI_dpTZjYfdBamkx6Na1p7D0tNwjkVdtv9esGn4UZYCYn/exec";

let fullTrash = [];

// ===== LOAD TRASH =====
async function loadTrash() {
  const loading = document.getElementById("loading");
  const container = document.getElementById("trashData");

  loading.classList.remove("hidden");
  container.innerHTML = "";

  try {
    const res = await fetch(WEB_APP_URL + "?trash=true");
    fullTrash = await res.json();
    renderTrash();
  } catch(err) {
    container.innerHTML = "<p class='text-red-400'>Failed to load trash</p>";
    console.error(err);
  }

  loading.classList.add("hidden");
}


// ===== RENDER =====
function renderTrash() {
  const search = document.getElementById("search").value.toLowerCase();
  let html = "";

  const filtered = fullTrash.filter(file =>
    file.name.toLowerCase().includes(search)
  );

  if (filtered.length === 0) {
    document.getElementById("trashData").innerHTML =
      "<p class='text-gray-400'>No files found</p>";
    return;
  }

  filtered.forEach(file => {
    html += `
    <div class="bg-gray-800 p-3 rounded mb-2 flex justify-between items-center">
      <div>
        <p class="text-gray-200 font-semibold">${file.name}</p>
        <p class="text-gray-500 text-sm">${file.date}</p>
      </div>

      <div class="flex gap-2">
        <button onclick="restore('${file.id}', this)"
          class="bg-green-500 px-3 py-1 rounded hover:bg-green-600">
          Restore
        </button>

        <button onclick="permanentDelete('${file.id}', this)"
          class="bg-red-500 px-3 py-1 rounded hover:bg-red-600">
          Delete
        </button>

        <a href="${file.url}" target="_blank"
          class="bg-blue-500 px-3 py-1 rounded hover:bg-blue-600">
          Open
        </a>
      </div>
    </div>
    `;
  });

  document.getElementById("trashData").innerHTML = html;
}


// ===== RESTORE =====
async function restore(id, btn){
  if(!confirm("Restore this file?")) return;

  btn.disabled = true;
  btn.innerText = "Restoring...";

  await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({ action: "restore", id })
  });

  // remove item instantly
  btn.closest(".bg-gray-800").remove();
}


// ===== DELETE =====
async function permanentDelete(id, btn){
  if(!confirm("Are you sure you want to delete this file?")) return;

  btn.disabled = true;
  btn.innerText = "Deleting...";

  await fetch(WEB_APP_URL, {
    method: "POST",
    body: JSON.stringify({ action: "permanentDelete", id })
  });

  alert("File permanently deleted!");

  // remove item instantly
  btn.closest(".bg-gray-800").remove();
}

// ===== INIT =====
window.onload = loadTrash;
</script>

</body>
</html>
